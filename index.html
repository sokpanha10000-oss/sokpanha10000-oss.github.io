<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Io Wand UI Library</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>GitHub Io Wand UI Library</h1>
        <p>Clean category buttons, three-dot menu, and copy-ready snippets.</p>
      </div>

      <div class="nav-row">
        <button class="btn" id="backBtn">Back</button>
        <button class="btn primary" id="nextBtn">Next</button>
        <button class="dots" id="dotsBtn">⋯</button>
      </div>

      <div id="sectionsList"></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title-wrap">
          <h2>Build UI Library Website</h2>
          <p>Every feature has its own button, and every method has its own code box.</p>
        </div>

        <div class="nav-row compact">
          <button class="btn" id="backBtn2">Back</button>
          <button class="btn primary" id="nextBtn2">Next</button>
          <button class="dots" id="dotsBtn2">⋯</button>
        </div>
      </div>

      <div class="content-head">
        <div>
          <h3 id="sectionTitle">Setup</h3>
          <small id="sectionSubtitle">Library</small>
        </div>
        <small id="sectionCounter">1 / 3</small>
      </div>

      <div class="cards" id="cards"></div>

      <div class="menu" id="menu">
        <h5>Sections</h5>
        <button data-menu-section="setup">Setup</button>
        <button data-menu-section="ui">UI</button>
        <button data-menu-section="elements">Elements</button>
        <div class="hint">Open a section, then copy the snippet you need.</div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast">Copied</div>

  <script src="main.js"></script>
</body>
</html>
