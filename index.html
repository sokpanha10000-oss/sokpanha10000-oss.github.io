<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Io Wand UI Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-nav">
        <div class="nav-left">
            <button id="menu-btn" class="icon-btn" title="Toggle Menu">⋮</button>
            <h1 class="nav-title">Description Description</h1>
        </div>
        <div class="nav-right">
            <button id="back-btn" class="nav-btn">Back</button>
            <button id="next-btn" class="nav-btn">Next</button>
        </div>
    </header>

    <div class="layout-container">
        <aside id="sidebar" class="sidebar">
            <div id="menu-content">
                </div>
        </aside>

        <main class="main-content">
            <div class="welcome-msg" id="welcome-msg">
                <h2>Select an item from the menu to view its code.</h2>
            </div>
            
            <div id="code-container" class="code-box hidden">
                <div class="code-header">
                    <span id="current-feature-title">Feature Title</span>
                    <button id="copy-btn" class="copy-btn">Copy Code</button>
                </div>
                <pre><code id="code-block"></code></pre>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
